# ============================================================
# Data Quality Rules — Stage 2
#
# The scoring system cross-references this file against
# dq_report.json. Each rule defines:
#   issue_type   — key written to dq_report.json.dq_issues[].issue_type
#   dq_flag      — value set in fact_transactions.dq_flag column
#   handling      — action string written to dq_report.json.dq_issues[].handling_action
#   scope         — which source file(s) the rule applies to
# ============================================================

rules:
  DUPLICATE_DEDUPED:
    issue_type: "duplicate_transactions"
    dq_flag: "DUPLICATE_DEDUPED"
    handling: "DEDUPLICATED_KEEP_FIRST"
    scope: transactions
    description: >
      Duplicate transaction events sharing the same transaction_id.
      Keep the earliest by transaction_timestamp; exclude the rest.

  ORPHANED_ACCOUNT:
    issue_type: "orphaned_transactions"
    dq_flag: "ORPHANED_ACCOUNT"
    handling: "QUARANTINED"
    scope: transactions
    description: >
      Transactions referencing an account_id not present in accounts.csv.
      Excluded from Silver/Gold entirely.

  TYPE_MISMATCH:
    issue_type: "amount_type_mismatch"
    dq_flag: "TYPE_MISMATCH"
    handling: "CAST_TO_DECIMAL"
    scope: transactions
    description: >
      The amount field was delivered as a JSON string rather than a number.
      Successfully cast to DECIMAL(18,2) and retained.

  DATE_FORMAT:
    issue_type: "date_format_inconsistency"
    dq_flag: "DATE_FORMAT"
    handling: "NORMALISED_DATE"
    scope: all
    description: >
      Date fields contain non-ISO formats (DD/MM/YYYY or Unix epoch).
      Normalised to YYYY-MM-DD and retained.

  CURRENCY_VARIANT:
    issue_type: "currency_variants"
    dq_flag: "CURRENCY_VARIANT"
    handling: "NORMALISED_CURRENCY"
    scope: transactions
    description: >
      Currency field contains non-standard representations (R, rands, 710, zar).
      Standardised to ZAR and retained.
    variant_map:
      "R": "ZAR"
      "r": "ZAR"
      "rands": "ZAR"
      "Rands": "ZAR"
      "RANDS": "ZAR"
      "710": "ZAR"
      "zar": "ZAR"
      "Zar": "ZAR"

  NULL_REQUIRED:
    issue_type: "null_account_id"
    dq_flag: "NULL_REQUIRED"
    handling: "EXCLUDED_NULL_PK"
    scope: accounts
    description: >
      The account_id primary key is null. Record cannot be identified.
      Excluded from Silver/Gold.

# Precedence for the single dq_flag column on retained records.
# When a record matches multiple issues, the highest-precedence flag wins.
# ORPHANED_ACCOUNT and NULL_REQUIRED rows are excluded, so they never
# compete for the flag column.
dq_flag_precedence:
  - DUPLICATE_DEDUPED
  - TYPE_MISMATCH
  - DATE_FORMAT
  - CURRENCY_VARIANT
